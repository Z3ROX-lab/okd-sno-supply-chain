name: Supply Chain Security Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  HARBOR_REGISTRY: harbor.okd.lab
  HARBOR_PROJECT: supply-chain
  IMAGE_NAME: app-demo

jobs:
  build-scan-sign:
    runs-on: [self-hosted, okd-sno]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Docker login Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.HARBOR_REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build image
        run: docker build -t ${{ env.IMAGE_TAG }} app/

      - name: Install Trivy v0.59.1 (pinned - safe version pre-TeamPCP attack)
        run: |
          wget -qO- https://github.com/aquasecurity/trivy/releases/download/v0.59.1/trivy_0.59.1_Linux-64bit.tar.gz | \
          tar -xz -C /usr/local/bin trivy
          trivy --version

      - name: Trivy scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            ${{ env.IMAGE_TAG }}

      - name: Push image
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Install Cosign v2.4.1 (pinned)
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64 \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign version

      - name: Cosign sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_TAG }}

      - name: ArgoCD sync
        run: |
          argocd app sync app-demo \
            --server argocd.okd.lab \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure
