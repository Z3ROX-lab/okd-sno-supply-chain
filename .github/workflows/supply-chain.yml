name: Supply Chain Security Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  HARBOR_REGISTRY: harbor.okd.lab
  HARBOR_PROJECT: supply-chain
  IMAGE_NAME: app-demo

jobs:
  build-scan-sign:
    runs-on: [self-hosted, okd-sno]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Trust Harbor CA
        run: |
          sudo mkdir -p /etc/docker/certs.d/harbor.okd.lab
          echo "${{ secrets.HARBOR_CA }}" | sudo tee /etc/docker/certs.d/harbor.okd.lab/ca.crt
          sudo systemctl reload docker 2>/dev/null || true

      - name: Docker login Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.HARBOR_REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build image
        run: docker build -t ${{ env.IMAGE_TAG }} app/

      - name: Trivy scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            ${{ env.IMAGE_TAG }}

      - name: Push image
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Cosign sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_TAG }}

      - name: ArgoCD sync
        run: |
          argocd app sync app-demo \
            --server argocd.okd.lab \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure
